<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&G Uniform Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #e2e8f0; color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        input[type=color] { -webkit-appearance: none; border: 2px solid #cbd5e1; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; }
        input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px; }
        input[type=color]::-webkit-color-swatch { border: none; border-radius: 6px; }
        .eyedropper-btn { cursor: pointer; transition: background 0.2s; }
        .eyedropper-btn:hover { background: #cbd5e1; }
        .img-sample-area { border: 2px dashed #94a3b8; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f1f5f9; }
        .img-sample-area:hover { border-color: #64748b; background: #e2e8f0; }
        .img-sample-area img { max-height: 80px; object-fit: contain; border-radius: 8px; margin: 0 auto; cursor: crosshair; }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #94a3b8; border-radius: 24px; transition: 0.3s; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle-slider { background: #475569; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        #imgCanvas { display: none; }
        .mockup-card { transition: transform 0.2s; }
        .mockup-card:hover { transform: translateY(-1px); }
        .mic-btn { cursor: pointer; transition: all 0.2s; border: none; background: #f1f5f9; border-radius: 8px; padding: 6px 10px; font-size: 16px; border: 1px solid #cbd5e1; }
        .mic-btn:hover { background: #e2e8f0; }
        .mic-btn.recording { background: #fee2e2; border-color: #f87171; animation: pulse-mic 1s infinite; }
        @keyframes pulse-mic { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body class="p-4 md:p-8">
<canvas id="imgCanvas"></canvas>

<div class="max-w-6xl mx-auto space-y-6">

    <!-- Header -->
    <header class="bg-slate-100 p-6 rounded-2xl shadow-md border border-slate-300 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="bg-slate-800 text-white w-12 h-12 rounded-xl flex items-center justify-center font-bold text-xl">T&G</div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">نظام تكوين الطلبات</h1>
                <p class="text-xs text-slate-600">إدارة الموك اب المتعددة</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <label class="text-sm font-bold text-slate-700">الشركة:</label>
            <select id="companySelect" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-sm font-bold outline-none w-48">
                <option value="T&G">T&G</option>
                <option value="Phoenix">Phoenix</option>
                <option value="Tsunami">Tsunami</option>
                <option value="U">U</option>
                <option value="Classy">Classy</option>
                <option value="Katana">Katana</option>
                <option value="Elite">Elite</option>
            </select>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- Left Col: Builder -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- Product Selection -->
            <div class="bg-slate-100 rounded-2xl shadow-sm border border-slate-300 overflow-hidden flex flex-col">
                <div class="bg-slate-200 p-4 border-b border-slate-300 font-bold text-sm text-slate-700">1. اختيار المنتج</div>
                <div id="categoryList" class="flex-1 overflow-y-auto p-2 space-y-1 max-h-[250px] custom-scrollbar"></div>
                <div class="p-4 bg-slate-200 border-t border-slate-300">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">المنتج:</label>
                    <select id="productSelect" onchange="state.product=this.value" class="w-full p-2.5 text-sm border border-slate-300 rounded-xl font-bold bg-white outline-none"></select>
                </div>
            </div>

            <!-- Specs & Colors -->
            <div class="bg-slate-100 rounded-2xl shadow-sm border border-slate-300 p-6 space-y-4">
                <div class="font-bold text-slate-700 border-b border-slate-300 pb-3">2. المواصفات والألوان</div>

                <div id="tshirtDetails" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">نوع الكم</label>
                        <div class="flex gap-1 p-1 bg-slate-200 rounded-xl">
                            <button onclick="setSleeve('نص كم')" id="sleeve-half" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white border border-slate-300">نص كم</button>
                            <button onclick="setSleeve('كم كامل')" id="sleeve-full" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-300">كم كامل</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">نوع القصة</label>
                        <select id="patternSelect" onchange="togglePatternDetails()" class="w-full p-2.5 text-sm border border-slate-300 rounded-lg bg-white font-bold outline-none">
                            <option value="منغير قصة">بدون قصة</option>
                            <option value="قصة">بقصة مخصصة</option>
                            <option value="تغير ياقة وسورة فقط">تغيير الياقة والأسورة</option>
                        </select>
                    </div>
                </div>

                <div id="patternDetailsBox" style="display:none" class="space-y-3 p-4 bg-slate-200/50 border border-slate-300 rounded-2xl">
                    <label class="block text-xs font-bold text-slate-500 uppercase">تفاصيل القصة</label>
                    <div class="relative">
                        <textarea id="patternDetails" class="w-full p-3 text-sm border border-slate-300 rounded-lg bg-white min-h-[70px] outline-none pl-10" placeholder="اشرح القصة..."></textarea>
                        <button class="mic-btn absolute top-2 left-2" onclick="startVoice('patternDetails', this)" title="اضغط للتحدث">🎙️</button>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">لون القصة</label>
                        <div id="cb_patternColor"></div>
                    </div>
                </div>

                <div id="collarCuffBox" style="display:none" class="space-y-3 p-4 bg-slate-200/50 border border-slate-300 rounded-2xl">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">لون التيشرت</label>
                        <div id="cb_mainColor2"></div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">لون الياقة</label>
                        <div id="cb_collarColor"></div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">لون الأسورة</label>
                        <div id="cb_cuffColor"></div>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-white rounded-lg border border-slate-300">
                        <span class="text-xs font-bold text-slate-600">لون الكم نفس الياقة</span>
                        <label class="toggle-switch"><input type="checkbox" id="sleeveMatchToggle"><span class="toggle-slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-white rounded-lg border border-slate-300">
                        <span class="text-xs font-bold text-slate-600">البادنا نفس الياقة</span>
                        <label class="toggle-switch"><input type="checkbox" id="padenaMatchToggle"><span class="toggle-slider"></span></label>
                    </div>
                </div>

                <div id="mainColorBox">
                    <label class="block text-xs font-bold text-slate-500 mb-2">لون المنتج</label>
                    <div id="cb_mainColor"></div>
                </div>
            </div>

            <!-- Logo Section -->
            <div class="bg-slate-100 rounded-2xl shadow-sm border border-slate-300 p-6 space-y-4">
                <div class="font-bold text-slate-700 border-b border-slate-300 pb-3">3. اللوجو والعلامات</div>
                <div class="flex gap-2 p-1 bg-slate-200 rounded-xl max-w-[200px]">
                    <button onclick="setLogo('تطريز')" id="logo-tatri" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white border border-slate-300">تطريز</button>
                    <button onclick="setLogo('طباعة')" id="logo-tabaa" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-300">طباعة</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="relative">
                        <textarea id="logoChest" class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm min-h-[70px] pl-10" placeholder="لوجو الصدر..."></textarea>
                        <button class="mic-btn absolute top-2 left-2" onclick="startVoice('logoChest', this)" title="اضغط للتحدث">🎙️</button>
                    </div>
                    <div class="relative">
                        <textarea id="logoBack" class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm min-h-[70px] pl-10" placeholder="لوجو الظهر..."></textarea>
                        <button class="mic-btn absolute top-2 left-2" onclick="startVoice('logoBack', this)" title="اضغط للتحدث">🎙️</button>
                    </div>
                </div>
                
                <button onclick="addMockup()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition-all">
                    ➕ إضافة الموك اب
                </button>
            </div>
        </div>

        <!-- Right Col: List & Actions -->
        <div class="lg:col-span-4 space-y-6">
            <!-- Mockup List -->
            <div class="bg-slate-100 rounded-2xl shadow-sm border border-slate-300 flex flex-col h-full min-h-[400px]">
                <div class="bg-slate-200 p-4 border-b border-slate-300 flex justify-between items-center">
                    <span class="font-bold text-sm text-slate-700">الموك اب المضافة</span>
                    <span id="mockupCount" class="bg-slate-800 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="mockupList" class="flex-1 p-4 space-y-2 overflow-y-auto max-h-[400px] custom-scrollbar">
                    <div class="text-center py-8 text-slate-400 text-sm">لا توجد موك اب</div>
                </div>
                
                <!-- Final Actions -->
                <div class="p-4 bg-slate-200 border-t border-slate-300 space-y-2">
                    <button onclick="copyAllMockups()" class="w-full bg-white text-slate-800 py-2 rounded-lg font-bold border border-slate-300 text-sm hover:bg-slate-50">
                        📄 نسخ
                    </button>
                    <button onclick="sendAllWA('201158159732')" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-emerald-700">أنس</button>
                    <button onclick="sendAllWA('201000364211')" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-blue-700">فاطمة</button>
                    <button onclick="sendAllWA('201094526896')" class="w-full bg-slate-700 text-white py-2 rounded-lg font-bold text-sm hover:bg-slate-800">عبدو</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const categories = [
    { name: "👕 التيشرتات", isTshirt: true, products: ["بولو بكم","بولو نص كم","بولو ميلتون","راوند بكم","راوند نص كم","راوند ميلتون"] },
    { name: "👖 البنطلونات", isTshirt: false, products: ["بنطلون كلاسيك","بنطلون باجي","بنطلون شيف ورك","بنطلون ميلتون","بنطلون جينز","بنطلون قطن"] },
    { name: "🧥 الجواكيت والهودي", isTshirt: false, products: ["جاكيت","جاكيت شيف","سويتشرت","هودي","هودي أوفر سايز"] },
    { name: "👔 القمصان", isTshirt: false, products: ["قميص"] },
    { name: "🦺 الفيست", isTshirt: false, products: ["فيست","فيست أمان","فيست مهندسين","فيست عمال"] },
    { name: "👨‍🔧 يونيفورم العمال", isTshirt: false, products: ["أفرول","بدل عمال","بدل عمال نظافة"] },
    { name: "🧑‍🍳 يونيفورم الشيف", isTshirt: false, products: ["جاكيت شيف","بنطلون شيف","كاب شيف"] },
    { name: "🏥 يونيفورم طبي", isTshirt: false, products: ["بالطو","سكراب"] },
    { name: "🎓 أطقم", isTshirt: false, products: ["طقم أطفال","طقم أولاد","طقم بنات"] },
    { name: "🧢 إكسسوارات", isTshirt: false, products: ["كاب","مرايل"] },
    { name: "🧶 ملابس إضافية", isTshirt: false, products: ["بلوفر"] },
];

let state = { category: categories[0], product: categories[0].products[0], sleeve: "نص كم", logo: "تطريز", pattern: "منغير قصة", colors: {} };
let addedMockups = [];
const imgDataStore = {};

function buildColorBlock(containerId, colorId, defaultVal) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = `
        <div class="flex items-center gap-2 flex-wrap mb-2">
            <input type="color" id="${colorId}" value="${defaultVal}">
            <span id="${colorId}_hex" class="text-[10px] font-mono text-slate-500 bg-white px-2 py-1 rounded border border-slate-300">${defaultVal}</span>
            <button onclick="pickEyedropper('${colorId}')" class="eyedropper-btn px-2 py-1 bg-white rounded text-[10px] font-bold text-slate-600 border border-slate-300">🔍 قطارة</button>
        </div>
        <input type="file" id="imgInput_${colorId}" accept="image/*" style="display:none" onchange="loadSampleImage(event,'${colorId}')">
        <input type="file" id="camInput_${colorId}" accept="image/*" capture="environment" style="display:none" onchange="loadSampleImage(event,'${colorId}')">
        <div id="imgPreview_${colorId}" class="img-sample-area" onclick="if(!imgDataStore['${colorId}'])document.getElementById('imgInput_${colorId}').click()">
            <p class="text-[10px] text-slate-400 leading-relaxed">🖼️ اضغط هنا لإضافة صورة<br>ثم اضغط <strong>🔍 قطارة</strong> أعلاه<br>ثم اضغط على المكان المراد أخذ اللون منه في الصورة</p>
        </div>
        <button onclick="document.getElementById('camInput_${colorId}').click()" class="mt-1 w-full flex items-center justify-center gap-1 py-1.5 bg-white border border-slate-300 rounded-lg text-[10px] font-bold text-slate-600 hover:bg-slate-100 transition-all">📷 تصوير بالكاميرا</button>
    `;
    state.colors[colorId] = defaultVal;
    document.getElementById(colorId).addEventListener('input', e => {
        state.colors[colorId] = e.target.value;
        document.getElementById(`${colorId}_hex`).textContent = e.target.value;
    });
}

function initAllColorBlocks() {
    buildColorBlock('cb_mainColor', 'mainColor', '#1e293b');
    buildColorBlock('cb_mainColor2', 'mainColor2', '#1e293b');
    buildColorBlock('cb_collarColor', 'collarColor', '#cbd5e1');
    buildColorBlock('cb_cuffColor', 'cuffColor', '#cbd5e1');
    buildColorBlock('cb_patternColor', 'patternColor', '#475569');
}

async function pickEyedropper(id) {
    try {
        const dropper = new EyeDropper();
        const result = await dropper.open();
        setColor(id, result.sRGBHex);
    } catch(e) {}
}

function setColor(id, hex) {
    const inp = document.getElementById(id);
    if(inp) inp.value = hex;
    state.colors[id] = hex;
    const hexEl = document.getElementById(`${id}_hex`);
    if(hexEl) hexEl.textContent = hex;
}

function loadSampleImage(event, id) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        imgDataStore[id] = e.target.result;
        const previewDiv = document.getElementById(`imgPreview_${id}`);
        previewDiv.className = 'img-sample-area';
        previewDiv.onclick = null;
        previewDiv.innerHTML = `<img src="${e.target.result}" id="sampleImg_${id}" class="max-h-16 rounded mx-auto" style="cursor:crosshair">`;
        document.getElementById(`sampleImg_${id}`).addEventListener('click', ev => pickColorFromImage(ev, id));
    };
    reader.readAsDataURL(file);
}

function pickColorFromImage(ev, id) {
    const imgSrc = imgDataStore[id];
    if(!imgSrc) return;
    const imgEl = ev.target;
    const canvas = document.getElementById('imgCanvas');
    const tempImg = new Image();
    tempImg.onload = () => {
        canvas.width = tempImg.naturalWidth; canvas.height = tempImg.naturalHeight;
        const ctx = canvas.getContext('2d'); ctx.drawImage(tempImg, 0, 0);
        const rect = imgEl.getBoundingClientRect();
        const scaleX = tempImg.naturalWidth / imgEl.offsetWidth;
        const scaleY = tempImg.naturalHeight / imgEl.offsetHeight;
        const x = Math.round((ev.clientX - rect.left) * scaleX);
        const y = Math.round((ev.clientY - rect.top) * scaleY);
        const px = ctx.getImageData(x, y, 1, 1).data;
        const hex = '#' + [px[0],px[1],px[2]].map(v => v.toString(16).padStart(2,'0')).join('');
        setColor(id, hex);
    };
    tempImg.src = imgSrc;
}

function init() {
    const catList = document.getElementById('categoryList');
    categories.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.className = `w-full text-right p-3 text-sm rounded-lg font-bold transition-all ${idx === 0 ? 'bg-slate-200 text-slate-800 border-r-4 border-slate-600' : 'text-slate-600 hover:bg-slate-200'}`;
        btn.innerText = cat.name;
        btn.onclick = () => selectCategory(cat, btn);
        catList.appendChild(btn);
    });
    initAllColorBlocks();
    updateProducts();
}

function selectCategory(cat, btn) {
    state.category = cat;
    document.querySelectorAll('#categoryList button').forEach(b => b.className = 'w-full text-right p-3 text-sm rounded-lg font-bold text-slate-600 hover:bg-slate-200 transition-all');
    btn.className = 'w-full text-right p-3 text-sm rounded-lg font-bold bg-slate-200 text-slate-800 border-r-4 border-slate-600 transition-all';
    updateProducts();
}

function updateProducts() {
    const select = document.getElementById('productSelect');
    select.innerHTML = '';
    state.category.products.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.innerText = p;
        select.appendChild(opt);
    });
    state.product = state.category.products[0];
    document.getElementById('tshirtDetails').style.display = state.category.isTshirt ? 'block' : 'none';
    togglePatternDetails();
}

function setSleeve(v) {
    state.sleeve = v;
    const a = "flex-1 py-2 text-xs font-bold rounded-lg bg-white border border-slate-300";
    const i = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-300";
    document.getElementById('sleeve-half').className = v === 'نص كم' ? a : i;
    document.getElementById('sleeve-full').className = v === 'كم كامل' ? a : i;
}

function setLogo(v) {
    state.logo = v;
    const a = "flex-1 py-2 text-xs font-bold rounded-lg bg-white border border-slate-300";
    const i = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-300";
    document.getElementById('logo-tatri').className = v === 'تطريز' ? a : i;
    document.getElementById('logo-tabaa').className = v === 'طباعة' ? a : i;
}

function togglePatternDetails() {
    if (!state.category.isTshirt) {
        document.getElementById('patternDetailsBox').style.display = 'none';
        document.getElementById('collarCuffBox').style.display = 'none';
        document.getElementById('mainColorBox').style.display = 'block';
        return;
    }
    state.pattern = document.getElementById('patternSelect').value;
    const isCustom = state.pattern === "قصة";
    const isCollar = state.pattern === "تغير ياقة وسورة فقط";
    const isNone = state.pattern === "منغير قصة";
    document.getElementById('patternDetailsBox').style.display = isCustom ? 'block' : 'none';
    document.getElementById('collarCuffBox').style.display = (isCollar || isCustom) ? 'block' : 'none';
    document.getElementById('mainColorBox').style.display = isNone ? 'block' : 'none';
}

function addMockup() {
    const mockup = {
        id: Date.now(),
        category: state.category.name,
        isTshirt: state.category.isTshirt,
        product: document.getElementById('productSelect').value,
        sleeve: state.sleeve,
        pattern: state.pattern,
        patternDetails: document.getElementById('patternDetails').value,
        patternColor: state.colors.patternColor,
        mainColor: state.category.isTshirt && state.pattern !== "منغير قصة" ? state.colors.mainColor2 : state.colors.mainColor,
        collarColor: state.colors.collarColor,
        cuffColor: state.colors.cuffColor,
        sleeveMatch: document.getElementById('sleeveMatchToggle')?.checked,
        padenaMatch: document.getElementById('padenaMatchToggle')?.checked,
        logoType: state.logo,
        logoChest: document.getElementById('logoChest').value,
        logoBack: document.getElementById('logoBack').value
    };
    addedMockups.push(mockup);
    document.getElementById('logoChest').value = '';
    document.getElementById('logoBack').value = '';
    document.getElementById('patternDetails').value = '';
    renderMockupList();
}

function removeMockup(id) {
    addedMockups = addedMockups.filter(m => m.id !== id);
    renderMockupList();
}

function renderMockupList() {
    const list = document.getElementById('mockupList');
    const count = document.getElementById('mockupCount');
    count.innerText = addedMockups.length;
    
    if (addedMockups.length === 0) {
        list.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">لا توجد موك اب</div>`;
        return;
    }
    
    list.innerHTML = addedMockups.map((m, idx) => `
        <div class="mockup-card bg-white p-3 rounded-lg border border-slate-300 relative group">
            <button onclick="removeMockup(${m.id})" class="absolute -top-2 -left-2 bg-red-500 text-white w-5 h-5 rounded-full text-xs opacity-0 group-hover:opacity-100 transition-all">×</button>
            <div class="flex justify-between items-start mb-1">
                <span class="text-[10px] font-bold text-slate-400">#${idx + 1}</span>
                <span class="text-xs font-bold text-slate-700">${m.product}</span>
            </div>
            <div class="flex gap-1">
                <div class="w-4 h-4 rounded border border-slate-200" style="background:${m.mainColor}"></div>
                ${m.isTshirt && m.pattern !== "منغير قصة" ? `<div class="w-4 h-4 rounded border border-slate-200" style="background:${m.collarColor}"></div><div class="w-4 h-4 rounded border border-slate-200" style="background:${m.cuffColor}"></div>` : ''}
            </div>
        </div>
    `).join('');
}

function buildFinalMessage() {
    if (addedMockups.length === 0) return "أضف موك اب واحد على الأقل";
    const company = document.getElementById('companySelect').value;
    let msg = `*طلب موك اب جديد*\n🏢 الشركة: ${company}\n━━━━━━━━━━━━━━━\n\n`;
    addedMockups.forEach((m, idx) => {
        msg += `*${idx + 1}. ${m.product}*\n`;
        if (m.isTshirt) {
            msg += `👕 الكم: ${m.sleeve}\n✂️ القصة: ${m.pattern}\n`;
            if (m.pattern === "قصة") {
                if (m.patternDetails) msg += `📝 تفاصيل: ${m.patternDetails}\n`;
                msg += `🎨 لون القصة: ${m.patternColor}\n`;
            }
            if (m.pattern !== "منغير قصة") {
                msg += `🎨 التيشرت: ${m.mainColor}\n🎨 الياقة: ${m.collarColor}\n🎨 الأسورة: ${m.cuffColor}\n`;
                if (m.sleeveMatch) msg += `✅ الكم: نفس الياقة\n`;
                if (m.padenaMatch) msg += `✅ البادنا: نفس الياقة\n`;
            } else msg += `🎨 اللون: ${m.mainColor}\n`;
        } else msg += `🎨 اللون: ${m.mainColor}\n`;
        msg += `🪡 اللوجو: ${m.logoType}\n`;
        if (m.logoChest) msg += `📍 الصدر: ${m.logoChest}\n`;
        if (m.logoBack) msg += `📍 الظهر: ${m.logoBack}\n\n`;
    });
    return msg;
}

function sendAllWA(phone) {
    const msg = buildFinalMessage();
    if (addedMockups.length === 0) return alert(msg);
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function copyAllMockups() {
    const text = buildFinalMessage();
    if (addedMockups.length === 0) return alert(text);
    navigator.clipboard.writeText(text).then(() => alert('تم النسخ!'));
}

// ===== Voice to Text =====
let activeRecognition = null;
let activeBtn = null;

function startVoice(targetId, btn) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('متصفحك لا يدعم التعرف على الصوت. استخدم Chrome.');
        return;
    }
    // إيقاف التسجيل الحالي إذا كان يعمل
    if (activeRecognition) {
        activeRecognition.stop();
        if (activeBtn) { activeBtn.classList.remove('recording'); activeBtn.textContent = '🎙️'; }
        if (activeBtn === btn) { activeRecognition = null; activeBtn = null; return; }
    }
    const recognition = new SpeechRecognition();
    recognition.lang = 'ar-EG';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { btn.classList.add('recording'); btn.textContent = '⏹️'; activeRecognition = recognition; activeBtn = btn; };
    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        const el = document.getElementById(targetId);
        el.value = (el.value ? el.value + ' ' : '') + transcript;
    };
    recognition.onerror = (e) => { if(e.error !== 'aborted') alert('خطأ: ' + e.error); };
    recognition.onend = () => { btn.classList.remove('recording'); btn.textContent = '🎙️'; activeRecognition = null; activeBtn = null; };
    recognition.start();
}

init();
</script>
